<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Carousel</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
    crossorigin="anonymous"
  />
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous">
  </script>
</head>
<body>

 <!-- Carousel wrapper -->
 <!-- the carousel-fade class is used to create a smooth fade transition  
      between slides instead of the default sliding effect. -->
<div id="slider" class="carousel slide carousel-fade" data-bs-ride="carousel">
  <!-- ---indicators/dots---- -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#slider" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#slider" data-bs-slide-to="1" >
    </button>
    <button type="button" data-bs-target="#slider" data-bs-slide-to="2" >
    </button>
</div>

  <!-- Slides -->
  <div class="carousel-inner">
    <!-- Slide 1 -->
    <div class="carousel-item active">
      <video class="d-block w-100"  autoplay loop muted >
        <source src="https://mdbcdn.b-cdn.net/img/video/Tropical.mp4" type="video/mp4" />
      </video>
      <div class="carousel-caption ">
        <h5>First Slide</h5>
        <p>Nulla vitae elit libero, a pharetra augue    
           mollis interdum.</p>
      </div>
    </div>

    <!-- Slide 2 -->
    <div class="carousel-item">
      <video class="d-block w-100" autoplay loop muted >
        <source src="https://mdbcdn.b-cdn.net/img/video/forest.mp4" type="video/mp4" />
      </video>
      <div class="carousel-caption ">
        <h5>Second Slide</h5>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      </div>
    </div>

    <!-- Slide 3 -->
    <div class="carousel-item">
      <video class="d-block w-100" autoplay loop muted >
        <source src="https://mdbcdn.b-cdn.net/img/video/Agua-natural.mp4" type="video/mp4" />
      </video>
      <div class="carousel-caption">
        <h5>Third Slide</h5>
        <p>Praesent commodo cursus magna, vel scelerisque nisl consectetur.</p>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#slider" data-bs-slide="prev" >
    <span class="carousel-control-prev-icon border border-1 rounded-circle  bg-danger" ></span>
  </button>

  <button class="carousel-control-next" type="button"  
   data-bs-target="#slider" data-bs-slide="next" >
  <span class="carousel-control-next-icon border border-1 rounded-circle  bg-warning" ></span>
  </button>
</div>
<!-- Carousel wrapper -->
</body>
</html>
