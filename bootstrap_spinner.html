<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- css link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- js link is down and css link up -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>Spinner</title>
  </head>

  <body>
    <div class="container mt-5">
      <div class="container mt-5">
        <div class="row">
          <div class="spinner-border text-muted me-5"></div>
          <div class="spinner-border text-primary me-5"></div>
          <div class="spinner-border text-success me-5"></div>
          <div class="spinner-border text-info me-5"></div>
          <div class="spinner-border text-warning me-5"></div>
          <div class="spinner-border text-danger me-5"></div>
          <div class="spinner-border text-secondary me-5"></div>
          <div class="spinner-border text-dark me-5"></div>
          <div class="spinner-border text-light me-5"></div>
        </div>
      </div>

      <div class="container mt-5">
        <div class="row">
          <div class="spinner-grow text-muted me-5"></div>
          <div class="spinner-grow text-primary me-5"></div>
          <div class="spinner-grow text-success me-5"></div>
          <div class="spinner-grow text-info me-5"></div>
          <div class="spinner-grow text-warning me-5"></div>
          <div class="spinner-grow text-danger me-5"></div>
          <div class="spinner-grow text-secondary me-5"></div>
          <div class="spinner-grow text-dark me-5"></div>
          <div class="spinner-grow text-light me-5"></div>
        </div>
      </div>

      <div class="container mt-5">
        <div class="row">
          <div class="spinner-border spinner-border-sm me-5"></div>
          <div class="spinner-grow spinner-grow-sm me-5"></div>
        </div>
      </div>

      <div class="container mt-5">
        <button class="btn btn-primary me-5">
          <span class="spinner-border spinner-border-sm"></span>
        </button>

        <button class="btn btn-primary me-5">
          <span class="spinner-border spinner-border-sm"></span>
          Loading..
        </button>

        <button class="btn btn-primary me-5" disabled>
          <span class="spinner-border spinner-border-sm"></span>
          Loading..
        </button>

        <button class="btn btn-primary me-5" disabled>
          <span class="spinner-grow spinner-grow-sm"></span>
          Loading..
        </button>
      </div>
    </div>
  </body>
</html>
