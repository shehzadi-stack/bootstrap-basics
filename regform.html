<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reg-form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- js link is down and css link up -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- CONTAINER  -->
    <div class="container">
      <!-- ROW  -->
      <div class="row">
        <!-- registration-form  -->
        <div class="mt-3 mb-3 col">
          <label>First Name:</label>
          <input type="text" name="name" class="form-control mt-3 w-100" />
        </div>
      </div>

      <div class="mt-3 mb-3 col">
        <label>Last Name:</label>
        <input type="text" name="name" class="form-control mt-3 w-100" />
      </div>

      <div class="mt-3 mb-3 col">
        <label>password:</label>
        <input type="password" name="password" class="form-control mt-3 w-50" />
      </div>

      <div class="mt-3 mb-3 col">
        <label>mobile No:</label>
        <input type="text" name="name" class="form-control mt-3 w-100" />
      </div>

      <div class="mt-3 mb-3 col">
        <label>Email:</label>
        <input type="email" name="email" class="form-control mt-3 w-100" />
      </div>

      <!-- or
            <div>
                <button> class="btn btn-outline-dark">Submit</button>
            </div> -->

      <div class="mt-3 mb-3 col">
        <label>City:</label>
        <select name="City" class="form-select mt-3">
          <option value="Hubli">Hubli</option>
          <option value="Dharwad">Dharwad</option>
          <option value="Belgaum">Belgaum</option>
          <option value="Bijapur">Bijapur</option>
          <option value="Karwar">Karwar</option>
        </select>
      </div>

      <div class="mt-3 mb-3">
        <label class="fw-bold">Gender:</label>
        <label
          >male<input
            type="radio"
            name="name"
            value="male"
            class="form-input-check"
        /></label>
        <label
          >Female
          <input
            type="radio"
            name="name"
            value="female"
            class="form-input-check"
        /></label>
      </div>

      <div class="mt-3 mb-3 col">
        <p><button class="btn btn-outline-danger">Submit</button></p>
      </div>
    </div>
  </body>
</html>
