<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>buttons bootstrap</title>
    <link
      rel="stylesheet"
      href="bootstrap 5.3\css/bootstrap.min.css"
      type="text/css"
    />
    <script
      src="bootstrap 5.3\js/bootstrap.bundle.min.js"
      type="text/js"
    ></script>
  </head>
  <body>
    <p class="text-center"><button class="btn">submit</button></p>
    <p class="text-center">
      <button class="btn btn-primary mt3 btn-lg">submit</button>
    </p>
    <p class="text-center bg-warning">
      <button class="btn btn-secondary mt3 btn-lg" style="width: 400px">
        submit
      </button>
    </p>
    <p class="text-center">
      <button class="btn btn-info mt3 btn-lg disabled">submit</button>
    </p>
    <p class="text-center">
      <button class="btn btn-danger mt3 btn-sm">submit</button>
    </p>
    <p class="text-center">
      <button class="btn btn-success mt3 btn-lg">submit</button>
    </p>
    <p class="text-center">
      <button class="btn btn-dark mt3 btn-lg">submit</button>
    </p>
    <p class="text-center">
      <button class="btn btn-light mt3 btn-lg">submit</button>
    </p>
    <p class="text-center">
      <button class="btn btn-warning mt3 btn-lg">submit</button>
    </p>
  </body>
</html>
