<!DOCTYPE html>
<html lang="en">
<head>
  <title>Offcanvas</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- js link is down and css link up -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>


<div class="container-fluid mt-3">
  <h3>Offcanvas Sidebar</h3>
  <p>Offcanvas is similar to modals, except that it is often used as a sidebar.</p>
  <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#demo">
    click here...
  </button>
</div>


<div class="offcanvas offcanvas-start" id="demo"> 
       <!--  start end top bottom -->


  <div class="offcanvas-header">
    <h1 class="offcanvas-title">Heading</h1> 
    <!-- offcanvas title is not mandatory -->
    <button type="button" class="btn-close bg-danger " data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">
    <p>Some text lorem ipsum.</p>
    <p>Some text lorem ipsum.</p>
    <p>Some text lorem ipsum.</p>
    <button class="btn btn-secondary" type="button">A Button</button>
  </div>
  

  <div class="offcanvas-footer">
    <button type="button" class="btn btn-danger" data-bs-dismiss="offcanvas">Cancel</button>
  </div>


  </div>
</body>
</html>
