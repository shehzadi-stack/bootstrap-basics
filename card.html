<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- js link is down and css link up -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Card</title>
</head>
<body class="bg-dark">
   <div class="container mt-5">

    <div class="row">
        <div class="card border border-5 bg-light border-light">
            <div class="card-header mt-3 bg-light text-dark text-center">
               <h1>Registration_<span class="text-warning">Form</span></h1>
            </div>

                <div class="card-body bg-light p-5">
                <div class="mt-3 mb-3">
                     <label>Name</label>
                     <input type="text"  name="text" title="enter Your name" placeholder="Enter Your Name" class="form-control  border  border-2 border-dark mt-3">
                </div>

                 <div class="mt-3 mb-3">
                     <label>Email</label>
                     <input type="email" name="email" class="form-control mt-3">
                </div>

                 <div class="mt-3 mb-3">
                     <label>Password</label>
                     <input type="password" name="password" class="form-control mt-3">
                </div>

                 <div class="mt-3 mb-3">
                     <button class="btn btn-primary btn-sm">Submit</button>
                </div>
            </div>

            <div class="card-footer mb-3 bg-dark text-light text-center">
               <h1>&copy copyright @ 2025</h1>
            </div>
        </div> 
    </div>
   </div>
</body>
</html>
