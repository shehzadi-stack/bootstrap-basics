<!DOCTYPE html>
<html>
  <head>
    <title>badge</title>
    <meta name="viewport" content="width-device-width, initial-scale=1.0" />
    <!-- ------------------css------------------ -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- js link is down and css link up -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- ---------------fontawesome----------- -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>

  <body>
    <div class="container mt-3 p-3">
      <div class="row">
        <p>
          <button class="btn btn-primary rounded-pill">
            Messages <span class="badge bg-danger">4</span>
          </button>
        </p>

        <p>
          <i class="fa fa-bell-o fs-3"></i>
          <span class="badge bg-danger mt-2 rounded-circle">4</span>
        </p>

        <p>
          <i class="fa fa-facebook fs-3"></i>
          <span class="badge bg-danger mt-2 rounded-circle">4</span>
        </p>

        <p>
          <i class="fa fa-telegram fs-3"></i>
          <span class="badge bg-danger mt-2 rounded-circle">4</span>
        </p>

        <p>
          <i class="fa fa-whatsapp fs-3"></i>
          <span class="badge bg-danger mt-2 rounded-circle">4</span>
        </p>

        <p>
          <button class="btn btn-primary rounded-pill">
            Messages<span class="badge bg-warning">4</span>
          </button>
        </p>
      </div>
    </div>
  </body>
</html>
