<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Bootstrap 5 Scrollspy - Sidebar Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 
    <style>
       
        section {
            height: 100vh;
            padding: 20px;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav id="sidebarMenu" class="col-lg-2  bg-light sidebar position-fixed">
                <div>
                    <ul class="navbar-nav flex-column ">
                        <li class="nav-item">
                            <a class="nav-link active" href="#item1">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#item2">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#item3">Education</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#item4">Internship</a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <section id="item1" class="bg-primary text-white">
                    <h1>Item 1</h1>
                    <p>Content for Item 1...</p>
                </section>
                <section id="item2" class="bg-secondary text-white">
                    <h1>Item 2</h1>
                    <p>Content for Item 2...</p>
                </section>
                <section id="item3" class="bg-success text-white">
                    <h1>Item 3</h1>
                    <p>Content for Item 3...</p>
                </section>
                <section id="item4" class="bg-warning text-dark">
                    <h1>Item 4</h1>
                    <p>Content for Item 4...</p>
                </section>
            </main>
        </div>
    </div>
    
</body>
