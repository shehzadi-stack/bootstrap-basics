<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wrap nowrap wrapreverse</title>
    <!-- --------------------------------cs library----------------------------- -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      <!-- -------------------------------js library---------------------------- -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <!-- --------------------------------------------------------------- -->
    <h3>FLEX-NO-WRAP</h3>
<div class="p-3 bg-light d-flex flex-nowrap border-2" style="width: 300px;">
         <div class="p-2 bg-primary text-white">Box 1</div>
         <div class="p-2 bg-success text-white">Box 2</div>
         <div class="p-2 bg-warning text-dark" >Box 3</div>
         <div class="p-2 bg-danger  text-white">Box 4</div>
         <div class="p-2 bg-info    text-dark" >Box 5</div>
</div>

   <!-- --------------------------------------------------------------- -->
     <h3>FLEX-WRAP</h3>
<div class="d-flex flex-wrap bg-light p-3 border" style="width: 300px;">
      <div class="p-2 bg-primary text-white">Box 1</div>
      <div class="p-2 bg-success text-white">Box 2</div>
      <div class="p-2 bg-warning text-dark" >Box 3</div>
      <div class="p-2 bg-danger text-white" >Box 4</div>
      <div class="p-2 bg-info text-dark"    >Box 5</div>
      <div class="p-2 bg-warning text-dark" >Box 6</div>
</div>

<!-- -------------------------------------------------------------------------- -->
     <h3>FLEX WRAP-REVERSE</h3>
<div class="d-flex flex-wrap-reverse bg-light p-3 border"style="width: 300px; height: 150px;">
       <div class="p-2 bg-primary text-white">Box 1</div>
       <div class="p-2 bg-success text-white">Box 2</div>
       <div class="p-2 bg-warning text-dark" >Box 3</div>
       <div class="p-2 bg-danger  text-white">Box 4</div>
       <div class="p-2 bg-info    text-dark" >Box 5</div>
</div>
</body>
</html>
